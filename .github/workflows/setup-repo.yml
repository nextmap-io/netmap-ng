name: Setup Repository Protection

# Run manually: Actions > Setup Repository Protection > Run workflow
# Requires a PAT with admin:repo scope stored as ADMIN_TOKEN secret.
on:
  workflow_dispatch:

jobs:
  setup:
    name: Configure branch and tag protection
    runs-on: ubuntu-latest
    steps:
      - name: Protect main branch
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.ADMIN_TOKEN }}
          script: |
            await github.rest.repos.updateBranchProtection({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: 'main',
              required_status_checks: {
                strict: true,
                contexts: [
                  'Backend Lint',
                  'Backend Typecheck',
                  'Backend Test',
                  'Frontend Lint',
                  'Frontend Typecheck',
                  'Frontend Build'
                ]
              },
              enforce_admins: true,
              required_pull_request_reviews: {
                required_approving_review_count: 1,
                dismiss_stale_reviews: true,
                require_code_owner_reviews: true
              },
              restrictions: null,
              allow_force_pushes: false,
              allow_deletions: false,
              required_linear_history: true,
              required_conversation_resolution: true
            });
            console.log('Branch protection configured for main');

      - name: Protect version tags
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.ADMIN_TOKEN }}
          script: |
            try {
              await github.rest.repos.createTagProtection({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pattern: 'v*'
              });
              console.log('Tag protection configured for v*');
            } catch (e) {
              if (e.status === 409) {
                console.log('Tag protection for v* already exists');
              } else {
                throw e;
              }
            }

      - name: Configure repository settings
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.ADMIN_TOKEN }}
          script: |
            await github.rest.repos.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              default_branch: 'main',
              delete_branch_on_merge: true,
              allow_squash_merge: true,
              allow_merge_commit: false,
              allow_rebase_merge: true,
              squash_merge_commit_title: 'PR_TITLE',
              squash_merge_commit_message: 'PR_BODY',
              has_issues: true,
              has_projects: false,
              has_wiki: false,
              allow_auto_merge: true
            });
            console.log('Repository settings configured');
