name: Question
description: Ask a question about setup, usage, or architecture
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question? We're happy to help.

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
    validations:
      required: true

  - type: dropdown
    id: topic
    attributes:
      label: Topic
      options:
        - Installation / Setup
        - Observium Integration
        - RRD / Traffic Data
        - Map Editor / Layout
        - AI-Assisted Layout
        - Authentication (OAuth)
        - API Usage
        - Performance / Scaling
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Any additional context (config, topology, screenshots, etc.)
