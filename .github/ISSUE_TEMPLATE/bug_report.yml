name: Bug Report
description: Report a bug in Netmap NG
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Netmap NG is affected?
      options:
        - Backend (API)
        - Frontend (UI / Map)
        - Observium Integration
        - RRD Data Source
        - AI Layout (Claude)
        - OAuth / Authentication
        - Docker / Deployment
        - Documentation
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Version, OS, browser, Observium version, etc.
      placeholder: |
        - Netmap NG version: v1.0.0
        - OS: Ubuntu 24.04
        - Browser: Chrome 120
        - Observium: CE 24.1
        - Docker: 27.0.3
      render: markdown

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output (backend logs, browser console, etc.)
      render: shell
